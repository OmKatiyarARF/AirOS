upstream jenkins {
    server jenkins:8080 fail_timeout=0;
}

server {
    listen 80;
    server_name _;   # replace with jenkins.airos.in once DNS is set

    # Increase body size for large artifact uploads
    client_max_body_size 100m;

    # Logging
    access_log /var/log/nginx/jenkins-access.log;
    error_log  /var/log/nginx/jenkins-error.log;

    location / {
        proxy_pass         http://jenkins;
        proxy_redirect     default;
        proxy_http_version 1.1;

        # Required headers for Jenkins
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (for Blue Ocean, live logs)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 150;
        proxy_send_timeout    100;
        proxy_read_timeout    100;
        proxy_buffers         4 32k;
    }
}
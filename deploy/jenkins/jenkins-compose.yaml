services:
  jenkins:
    image: jenkins-custom
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    restart: unless-stopped
    # Grant the jenkins user access to the mounted Docker socket. The socket is
    # owned by the host "docker" group; jenkins must share that GID to use it.
    # Override DOCKER_GID in .env if your host's docker group differs (default 992).
    group_add:
      - "${DOCKER_GID:-992}"
    ports:
      - "9080:8080"      # Jenkins UI (direct access, proxied via nginx on 90)
      - "50000:50000"    # Jenkins agent port
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./casc:/var/jenkins_home/casc:ro
      - ./repos.json:/var/jenkins_home/repos.json:ro
      - ${REPOS_VOLUME:-/home/ec2-user}:/home/ec2-user:ro
      # Deploy targets must be writable: the Jenkinsfile runs `git fetch`/`reset`
      # and `docker compose up` from these persistent host checkouts. These rw
      # mounts overlay the broad read-only mount above for just the deploy paths.
      - /home/ec2-user/AirOS:/home/ec2-user/AirOS:rw
      - /home/ec2-user/central_auth_framework:/home/ec2-user/central_auth_framework:rw
      - ${SSH_VOLUME:-/home/ec2-user/.ssh}:/var/jenkins_home/.ssh:ro
    environment:
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc/jenkins.yaml
      - JENKINS_ADMIN_USER=${JENKINS_ADMIN_USER}
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD}
      - GITHUB_USER=${GITHUB_USER}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REPO_NAME=${REPO_NAME:-}
      - DEPLOY_PATH=${DEPLOY_PATH:-}
      - DEPLOY_TYPE=${DEPLOY_TYPE:-}
      # Enable Content Security Policy (fixes dashboard warning)
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Djenkins.security.ContentSecurityPolicy.policy="default-src 'self'; script-src 'self'; style-src 'self';"
    networks:
      - jenkins-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: jenkins-nginx
    restart: unless-stopped
    ports:
      - "90:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      jenkins:
        condition: service_healthy
    networks:
      - jenkins-net

volumes:
  jenkins_home:

networks:
  jenkins-net:
    driver: bridge

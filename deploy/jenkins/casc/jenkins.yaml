jenkins:
  systemMessage: "AirOS Jenkins — Managed via JCasC. Do not configure via UI."
  numExecutors: 1
  mode: NORMAL
  scmCheckoutRetryCount: 3

  globalNodeProperties:
    - envVars:
        env:
          - key: "REPO_NAME"
            value: ""
          - key: "DEPLOY_PATH"
            value: ""
          - key: "DEPLOY_TYPE"
            value: ""

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

# Where Jenkins writes build data on disk
unclassified:
  location:
    url: "http://localhost:90/"
    adminAddress: "admin@airawat.org"

  timestamper:
    allPipelines: true

  globalLibraries:
    libraries: []

# Credentials managed by JCasC — values come from env vars.
#
# One credential per GitHub ACCOUNT/ORG. Each repo in repos.json points at one
# of these by its "credentials_id". To watch repos owned by another account,
# add its PAT to the .env file and add a matching block here, then reference
# that id from repos.json.
credentials:
  system:
    domainCredentials:
      - credentials:
          # Default GitHub account. id must match repos.json "credentials_id".
          - usernamePassword:
              scope: GLOBAL
              id: "github-creds"
              username: "${GITHUB_USER}"
              password: "${GITHUB_TOKEN}"
              description: "GitHub username + PAT (default account)"
          # Second GitHub account/org. Fill GITHUB_AIRAWAT_USER / _TOKEN in .env
          # to activate; the :- defaults keep Jenkins booting if left blank.
          - usernamePassword:
              scope: GLOBAL
              id: "github-airawat"
              username: "${GITHUB_AIRAWAT_USER:-unset}"
              password: "${GITHUB_AIRAWAT_TOKEN:-unset}"
              description: "GitHub username + PAT (Airawat org account)"

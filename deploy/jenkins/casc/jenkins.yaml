jenkins:
  systemMessage: "AirOS Jenkins — Managed via JCasC. Do not configure via UI."
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 3

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  remotingSecurity:
    enabled: true

# Where Jenkins writes build data on disk
unclassified:
  location:
    url: "http://jenkins.airos.in/"
    adminAddress: "om.katiyar@airawat.org"

  timestamper:
    allPipelines: true

  globalLibraries:
    libraries: []

# Credentials managed by JCasC — values come from env vars
credentials:
  system:
    domainCredentials:
      - credentials:
          # GitHub credentials for cloning repos and webhooks
          - usernamePassword:
              scope: GLOBAL
              id: "github-creds"
              username: "${GITHUB_USER}"
              password: "${GITHUB_TOKEN}"
              description: "GitHub username + PAT"

          # SSH key for deploying to production server
          # NOTE: The private key file must exist inside the container at the path below.
          # Mount it via docker-compose volumes or copy it during build.
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: "prod-server-ssh"
              username: "${PROD_SERVER_USER}"
              description: "SSH key for production server"
              privateKeySource:
                directEntry:
                  privateKey: "${PROD_SSH_PRIVATE_KEY}"

# Job definitions (optional — can also use Multibranch Pipeline from UI)
jobs:
   - script: >
      multibranchPipelineJob('AirOS-Platform') {
        branchSources {
          github {
            id('airos-platform')
            repoOwner('${GITHUB_REPO_OWNER}')
            repository('${GITHUB_REPO_NAME}')
            credentialsId('github-creds')
            configuredByUrl(false)
          }
        }
        factory {
          workflowBranchProjectFactory {
            scriptPath('Jenkinsfile')
          }
        }
        orphanedItemStrategy {
          discardOldItems {
            numToKeep(20)
          }
        }
        triggers {
          periodicFolderTrigger {
            interval('1d')
          }
        }
      }

# Security: disable old protocols
security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false
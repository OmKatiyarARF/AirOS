jenkins:
  systemMessage: "AirOS Jenkins — Managed via JCasC. Do not configure via UI."
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 3

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  remotingSecurity:
    enabled: true

# Where Jenkins writes build data on disk
unclassified:
  location:
    url: "http://13.205.13.220/"
    adminAddress: "admin@airawat.org"

  timestamper:
    allPipelines: true

  globalLibraries:
    libraries: []

# Credentials managed by JCasC — values come from env vars
credentials:
  system:
    domainCredentials:
      - credentials:
          # GitHub credentials for cloning repos and webhooks
          - usernamePassword:
              scope: GLOBAL
              id: "github-creds"
              username: "${GITHUB_USER}"
              password: "${GITHUB_TOKEN}"
              description: "GitHub username + PAT"

# Global environment variables (fallback defaults for builds)
jenkins:
  globalNodeProperties:
    - envVars:
        env:
          - key: "REPO_NAME"
            value: ""
          - key: "DEPLOY_PATH"
            value: ""
          - key: "DEPLOY_TYPE"
            value: ""

# Security: disable old protocols
security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false
